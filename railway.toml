# Railway Deployment Configuration for PaddleOCR-VL-1.5 FastAPI service

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Dynamic port binding using the $PORT environment variable
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

# Restart policy for container reliability
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Healthcheck configuration using the FastAPI /health endpoint
# Model is pre-downloaded, so startup will be fast, but 120s ensures plenty of buffer.
healthcheckPath = "/health"
healthcheckTimeout = 120
